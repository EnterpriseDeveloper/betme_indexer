version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: indexer_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    container_name: indexer_server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "2020:2020"

volumes:
  postgres_data: